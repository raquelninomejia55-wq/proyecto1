<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Trivia interctiva avanzada</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="app">
            <h1>Trivia interctiva</h1>

            <div id="start-screen">
                <input type="text" id="player-name" placeholder="Ingresa tu nombre">
                <select id="category">
                    <option value="general">General</option>
                    <option value="Ciencia">Ciencia</option>
                    <option value="historia">Historia</option>
                    <option value="tecnologia">Tecnolgia</option>
                </select>
                <button onclick="startGame()">Comenzar</button>
                <button onclick="toggleTheme()">Modo oscuro</button>
            </div>
            <div id="quiz-screen" class="hidden">
                <h2 id="question"></h2>
                <div id="options"></div>
                <p id="timer"></p>
                <p id="level"></p>
            </div>
            <div id="end-screen" clss="hidden">
                <h2>Juego terminado</h2>
                <p id="score"></p>
                <h3>Ranking</h3>
                <ul id="Ranking"></ul>
                <button onclick="restaGame()">Jugar de nuevo</button>
            </div>
        </div>
        <audio id="correct-sound" src="correct.mp3"></audio>
        <audio id="wrong-sund" src="wrong.mp3"></audio>
        <p>FIGUEROA PATIÑO, VERDUGO PALOMINO, CALDERON MARTINEZ</p>

        <script src="script.js"></script>
    </body>

</html>
